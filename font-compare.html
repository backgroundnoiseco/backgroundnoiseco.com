<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Font Comparison</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tac+One&family=Cormorant+Garamond:wght@300;400;500&family=Outfit:wght@300;400;600;700&family=Bebas+Neue&family=Jost:wght@400;500;600;700&family=Six+Caps&family=Romanesco&family=Freehand&family=Mrs+Sheppards&family=Smooch&family=Sarina&family=Comforter&family=Aguafina+Script&family=Seaweed+Script&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'WC Mano Negra';
      src: url('fonts/WCManoNegraBta.otf') format('opentype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'WC Mano Negra';
      src: url('fonts/WCManoNegraBoldBta.otf') format('opentype');
      font-weight: 700;
    }
    @font-face {
      font-family: 'Great Lakes';
      src: url('fonts/GREALN__-webfont.woff') format('woff');
      font-weight: 400;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: "Outfit", sans-serif;
      padding: 48px;
    }
    h1 {
      font-family: "Outfit", sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: #555;
      margin-bottom: 32px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .option {
      padding: 32px;
      border: 1px solid #222;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .option:hover {
      border-color: #444;
    }
    .option .logo:focus {
      outline: none;
      border-bottom: 1px solid #333;
    }
    .option .logo {
      font-size: 24px;
      background: linear-gradient(135deg, #888, #ddd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    .option .name {
      font-size: 11px;
      color: #555;
      letter-spacing: 0.05em;
    }
    .option.current .name::after {
      content: " (current)";
      color: #888;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 16px;
      margin-top: 12px;
    }
    .control {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .control .label-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .control label {
      font-size: 9px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .control .val {
      font-size: 9px;
      color: #666;
      font-variant-numeric: tabular-nums;
    }
    .slider {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 2px;
      background: #333;
      border-radius: 1px;
      outline: none;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #888;
      cursor: pointer;
    }
    .master-controls {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 32px;
      padding: 24px 32px;
      border: 1px solid #222;
      border-radius: 8px;
    }
    .master-controls input[type="text"] {
      background: none;
      border: none;
      border-bottom: 1px solid #333;
      color: #e0e0e0;
      font-size: 18px;
      font-family: inherit;
      padding: 4px 0;
      outline: none;
      width: 240px;
      flex-shrink: 0;
    }
    .master-controls input[type="text"]:focus {
      border-bottom-color: #555;
    }
    .master-controls .controls {
      flex: 1;
      margin-top: 0;
    }
    .case-toggles {
      display: flex;
      gap: 4px;
      margin-top: 12px;
    }
    .case-btn {
      font-size: 9px;
      color: #555;
      background: none;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: color 0.2s, border-color 0.2s;
    }
    .case-btn:hover {
      border-color: #555;
    }
    .case-btn.active {
      color: #ccc;
      border-color: #666;
    }
  </style>
</head>
<body>
  <h1>Logo Font Comparison</h1>
  <div class="master-controls">
    <input type="text" id="logo-text" value="BG Noise Co." spellcheck="false">
    <div class="controls" id="master-sliders"></div>
  </div>
  <div class="grid"></div>
  <script>
    const fonts = [
      { name: 'Tac One', family: '"Tac One", sans-serif', weight: 400, current: true },
      { name: 'Cormorant Garamond', family: '"Cormorant Garamond", serif', weight: 400 },
      { name: 'Outfit', family: '"Outfit", sans-serif', weight: 400 },
      { name: 'Bebas Neue', family: '"Bebas Neue", sans-serif', weight: 400 },
      { name: 'Jost', family: '"Jost", sans-serif', weight: 400 },
      { name: 'Six Caps', family: '"Six Caps", sans-serif', weight: 400 },
      { name: 'Romanesco', family: '"Romanesco", cursive', weight: 400 },
      { name: 'Freehand', family: '"Freehand", cursive', weight: 400 },
      { name: 'Mrs Sheppards', family: '"Mrs Sheppards", cursive', weight: 400 },
      { name: 'Smooch', family: '"Smooch", cursive', weight: 400 },
      { name: 'Sarina', family: '"Sarina", cursive', weight: 400 },
      { name: 'Comforter', family: '"Comforter", cursive', weight: 400 },
      { name: 'Aguafina Script', family: '"Aguafina Script", cursive', weight: 400 },
      { name: 'Seaweed Script', family: '"Seaweed Script", cursive', weight: 400 },
      { name: 'WC Mano Negra', family: '"WC Mano Negra", sans-serif', weight: 400 },
      { name: 'Great Lakes', family: '"Great Lakes", sans-serif', weight: 400 },
    ];
    const saved = JSON.parse(localStorage.getItem('fontCompare') || '{}');
    if (!saved._master) saved._master = {};
    function save() { localStorage.setItem('fontCompare', JSON.stringify(saved)); }

    // Master controls
    const textInput = document.getElementById('logo-text');
    const masterSliders = document.getElementById('master-sliders');
    const logos = [];
    let gradStart = '#888', gradEnd = '#ddd';

    if (saved._master.text) textInput.value = saved._master.text;
    textInput.addEventListener('input', () => {
      saved._master.text = textInput.value;
      save();
      fonts.forEach((f, i) => {
        const s = saved[f.name];
        if (!s || !s.custom_text) logos[i].textContent = textInput.value;
      });
    });

    function updateAllGradients() {
      logos.forEach(el => {
        el.style.background = `linear-gradient(135deg, ${gradStart}, ${gradEnd})`;
        el.style.webkitBackgroundClip = 'text';
        el.style.backgroundClip = 'text';
        el.style.webkitTextFillColor = 'transparent';
      });
    }

    function makeMasterControl(label, min, max, dflt, step, onInput) {
      const s = saved._master;
      const storageKey = label.toLowerCase().replace(/\s/g, '_');
      const value = s[storageKey] !== undefined ? s[storageKey] : dflt;
      const wrap = document.createElement('div');
      wrap.className = 'control';
      const labelRow = document.createElement('div');
      labelRow.className = 'label-row';
      const lbl = document.createElement('label');
      lbl.textContent = label;
      const val = document.createElement('span');
      val.className = 'val';
      val.textContent = value;
      labelRow.appendChild(lbl);
      labelRow.appendChild(val);
      const slider = document.createElement('input');
      slider.type = 'range';
      slider.className = 'slider';
      slider.min = min; slider.max = max; slider.value = value; slider.step = step;
      slider.addEventListener('input', () => {
        val.textContent = slider.value;
        s[storageKey] = parseFloat(slider.value);
        save();
        onInput(slider.value);
      });
      slider.addEventListener('dblclick', () => {
        slider.value = dflt;
        val.textContent = dflt;
        s[storageKey] = parseFloat(dflt);
        save();
        onInput(dflt);
      });
      wrap.appendChild(labelRow);
      wrap.appendChild(slider);
      onInput(value);
      return wrap;
    }

    masterSliders.appendChild(makeMasterControl('Grad Start', 0, 100, 53, 1, v => {
      const hex = Math.round(v * 2.55).toString(16).padStart(2, '0');
      gradStart = `#${hex}${hex}${hex}`;
      updateAllGradients();
    }));
    masterSliders.appendChild(makeMasterControl('Grad End', 0, 100, 87, 1, v => {
      const hex = Math.round(v * 2.55).toString(16).padStart(2, '0');
      gradEnd = `#${hex}${hex}${hex}`;
      updateAllGradients();
    }));

    // Font cards
    const grid = document.querySelector('.grid');
    fonts.forEach((f, i) => {
      const key = f.name;
      if (!saved[key]) saved[key] = {};
      const s = saved[key];

      const div = document.createElement('div');
      div.className = 'option' + (f.current ? ' current' : '');
      const logo = document.createElement('div');
      logo.className = 'logo';
      logo.contentEditable = true;
      logo.spellcheck = false;
      logo.textContent = s.custom_text || textInput.value;
      logo.style.fontFamily = f.family;
      logo.style.fontWeight = f.weight;
      logo.addEventListener('input', () => {
        s.custom_text = logo.textContent;
        save();
      });
      logo.addEventListener('dblclick', () => {
        logo.textContent = textInput.value;
        delete s.custom_text;
        save();
      });
      logos.push(logo);
      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = f.name;

      function makeControl(label, min, max, dflt, step, onInput) {
        const storageKey = label.toLowerCase().replace(/\s/g, '_');
        const value = s[storageKey] !== undefined ? s[storageKey] : dflt;
        const wrap = document.createElement('div');
        wrap.className = 'control';
        const labelRow = document.createElement('div');
        labelRow.className = 'label-row';
        const lbl = document.createElement('label');
        lbl.textContent = label;
        const val = document.createElement('span');
        val.className = 'val';
        val.textContent = value;
        labelRow.appendChild(lbl);
        labelRow.appendChild(val);
        const slider = document.createElement('input');
        slider.type = 'range';
        slider.className = 'slider';
        slider.min = min; slider.max = max; slider.value = value; slider.step = step;
        slider.addEventListener('input', () => {
          val.textContent = slider.value;
          s[storageKey] = parseFloat(slider.value);
          save();
          onInput(slider.value);
        });
        slider.addEventListener('dblclick', () => {
          slider.value = dflt;
          val.textContent = dflt;
          s[storageKey] = parseFloat(dflt);
          save();
          onInput(dflt);
        });
        wrap.appendChild(labelRow);
        wrap.appendChild(slider);
        onInput(value);
        return wrap;
      }

      const controls = document.createElement('div');
      controls.className = 'controls';
      controls.appendChild(makeControl('Size', 12, 64, 24, 1, v => { logo.style.fontSize = v + 'px'; }));
      controls.appendChild(makeControl('Kerning', -10, 20, -0.5, 0.5, v => { logo.style.letterSpacing = v + 'px'; }));
      controls.appendChild(makeControl('Word Gap', -5, 30, 0, 0.5, v => { logo.style.wordSpacing = v + 'px'; }));
      controls.appendChild(makeControl('Clip', 0, 40, 0, 1, v => { logo.style.clipPath = v > 0 ? `inset(${v}% 0)` : 'none'; }));

      const cases = [
        { label: 'Aa', value: 'none' },
        { label: 'AA', value: 'uppercase' },
        { label: 'aa', value: 'lowercase' },
      ];
      const caseToggles = document.createElement('div');
      caseToggles.className = 'case-toggles';
      const savedCase = s.text_case || 'none';
      logo.style.textTransform = savedCase;
      cases.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'case-btn' + (savedCase === c.value ? ' active' : '');
        btn.textContent = c.label;
        btn.addEventListener('click', () => {
          caseToggles.querySelectorAll('.case-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          logo.style.textTransform = c.value;
          s.text_case = c.value;
          save();
        });
        caseToggles.appendChild(btn);
      });

      div.appendChild(logo);
      div.appendChild(name);
      div.appendChild(caseToggles);
      div.appendChild(controls);
      grid.appendChild(div);
    });

    // Apply initial gradient to all logos
    updateAllGradients();
  </script>
</body>
</html>
