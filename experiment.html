<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>—</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scene {
      position: relative;
      width: 300px;
      height: 420px;
    }

    .behind {
      position: absolute;
      inset: 0;
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
    }

    .floor {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .frame {
      position: absolute;
      inset: 0;
      border: 2px solid #2a2a2a;
      pointer-events: none;
      z-index: 10;
    }

    /* --- Main double doors --- */

    .doors {
      position: absolute;
      display: flex;
      overflow: hidden;
      user-select: none;
      pointer-events: none;
    }

    .door {
      height: 100%;
      width: 50%;
      background: #141414;
      flex-shrink: 0;
      position: relative;
      will-change: transform;
      pointer-events: auto;
      cursor: grab;
    }

    .door.dragging { cursor: grabbing; }

    .door.snapping { transition: transform 0.35s ease; }

    #doors { inset: 0; }

    #doors .door::before {
      content: '';
      position: absolute;
      inset: 20px;
      border: 1px solid #1c1c1c;
    }

    #doors .door-left::after,
    #doors .door-right::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #333;
      transform: translateY(-50%);
    }
    #doors .door-left::after  { right: 12px; }
    #doors .door-right::after { left: 12px; }

    /* --- Inner arch door --- */

    #door2-wrap {
      position: absolute;
      width: 56px;
      height: 84px;
      left: 122px;
      top: 244px;
      overflow: hidden;
      cursor: ns-resize;
      user-select: none;
      clip-path: path('M 0,84 L 0,44 C 0,16 28,0 28,0 C 28,0 56,16 56,44 L 56,84 Z');
    }

    #door2-wrap.dragging { cursor: grabbing; }

    .arch-border {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #door2 {
      width: 100%;
      height: 100%;
      background: #161616;
      position: relative;
    }

    #door2::after {
      content: '';
      position: absolute;
      top: 60%;
      right: 8px;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #2a2a2a;
    }

  </style>
</head>
<body>

  <div class="scene">
    <div class="behind">
      <svg class="floor" viewBox="0 0 300 420" xmlns="http://www.w3.org/2000/svg">
        <!-- drawn back-to-front (painter's algorithm) -->
        <polygon id="floor-s7" fill="#111"/>
        <polygon id="floor-r7" fill="#0d0d0d"/>
        <polygon id="floor-s6" fill="#111"/>
        <polygon id="floor-r6" fill="#0d0d0d"/>
        <polygon id="floor-s5" fill="#111"/>
        <polygon id="floor-r5" fill="#0d0d0d"/>
        <polygon id="floor-s4" fill="#111"/>
        <polygon id="floor-r4" fill="#0d0d0d"/>
        <polygon id="floor-s3" fill="#111"/>
        <polygon id="floor-r3" fill="#0d0d0d"/>
        <polygon id="floor-s2" fill="#111"/>
        <polygon id="floor-r2" fill="#0d0d0d"/>
        <polygon id="floor-s1" fill="#111"/>
        <polygon id="floor-r1" fill="#0d0d0d"/>
        <polygon id="floor-s0" fill="#111"/>
      </svg>
      <div id="door2-wrap">
        <div id="door2"></div>
        <svg class="arch-border" viewBox="0 0 56 84" xmlns="http://www.w3.org/2000/svg">
          <path d="M 0,84 L 0,44 C 0,16 28,0 28,0 C 28,0 56,16 56,44 L 56,84 Z" fill="none" stroke="#222" stroke-width="1.5"/>
        </svg>
      </div>
    </div>

    <div class="doors" id="doors">
      <div class="door door-left"  id="doorL"></div>
      <div class="door door-right" id="doorR"></div>
    </div>

    <div class="frame"></div>
  </div>

  <script>
    // ── Outer double doors ──────────────────────────────────────────────────
    function makeDoors(doorL, doorR, doorsEl, halfW, peek) {
      const MAX_TX = halfW - peek;
      let isOpen = false, dragging = false;
      let startX = 0, baseProgress = 0, progress = 0;
      let lastX = 0, lastTime = 0, velocity = 0, dragDir = 1;

      function cx(e) { return e.touches ? e.touches[0].clientX : e.clientX; }

      function apply(p, snap = false) {
        progress = Math.max(0, Math.min(1, p));
        const tx = progress * MAX_TX;
        doorL.classList.toggle('snapping', snap);
        doorR.classList.toggle('snapping', snap);
        doorL.style.transform = `translateX(${-tx}px)`;
        doorR.style.transform = `translateX(${tx}px)`;
      }

      function down(e, dir) {
        dragging = true;
        startX = lastX = cx(e);
        lastTime = Date.now();
        velocity = 0;
        baseProgress = progress;
        dragDir = dir;
        doorL.classList.add('dragging');
        doorR.classList.add('dragging');
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move, { passive: true });
        window.addEventListener('mouseup',   up);
        window.addEventListener('touchend',  up);
      }

      function move(e) {
        if (!dragging) return;
        const x = cx(e);
        velocity = (x - lastX) / (Date.now() - lastTime || 1);
        lastX = x; lastTime = Date.now();
        apply(baseProgress + (x - startX) * dragDir / halfW);
      }

      function up() {
        if (!dragging) return;
        dragging = false;
        doorL.classList.remove('dragging');
        doorR.classList.remove('dragging');
        window.removeEventListener('mousemove', move);
        window.removeEventListener('touchmove', move);
        window.removeEventListener('mouseup',   up);
        window.removeEventListener('touchend',  up);

        const totalDx = (lastX - startX) * dragDir;
        if (Math.abs(totalDx) < 4) { apply(isOpen ? 1 : 0, true); return; }
        let target = Math.abs(velocity) > 0.5 ? (velocity * dragDir > 0 ? 1 : 0) : (progress >= 0.5 ? 1 : 0);
        isOpen = target === 1;
        apply(target, true);
      }

      doorL.addEventListener('mousedown',  e => down(e, -1));
      doorR.addEventListener('mousedown',  e => down(e,  1));
      doorL.addEventListener('touchstart', e => down(e, -1), { passive: true });
      doorR.addEventListener('touchstart', e => down(e,  1), { passive: true });

      apply(0);
    }

    // ── Stair floor ─────────────────────────────────────────────────────────
    // Tread depths front→back: 24,18,14,11,9,7,5,4 = 92px total
    // y-bands: 420→396→378→364→353→344→337→332→328
    // xl/xr at each y (perspective: left -60→115, right 360→185 over 92px):
    //   y=396: xl=-14, xr=314
    //   y=378: xl=20,  xr=280
    //   y=364: xl=47,  xr=253
    //   y=353: xl=67,  xr=233
    //   y=344: xl=85,  xr=215
    //   y=337: xl=98,  xr=202
    //   y=332: xl=107, xr=193
    //   y=328: xl=115, xr=185

    const floorEls = {};
    for (let i = 0; i <= 7; i++) floorEls[`s${i}`] = document.getElementById(`floor-s${i}`);
    for (let i = 1; i <= 7; i++) floorEls[`r${i}`] = document.getElementById(`floor-r${i}`);
    const door2Wrap = document.getElementById('door2-wrap');

    const DOOR_INIT_TOP = 244;
    const R = 20; // equal riser height per step
    // Cumulative elevations: strip n lifts by n*R
    // 7 steps → door lifts 7*R = 140px

    // y and x coords for each band boundary (index 0=bottom, 8=top/door)
    const BY = [420, 396, 378, 364, 353, 344, 337, 332, 328];
    const BXL = [-60, -14, 20, 47, 67, 85, 98, 107, 115];
    const BXR = [360, 314, 280, 253, 233, 215, 202, 193, 185];

    function pts(arr) { return arr.map(p => p.join(',')).join(' '); }

    function updateFloor(p) {
      const e = (n) => p * n * R; // elevation for strip n

      for (let n = 0; n <= 7; n++) {
        const en  = e(n);
        const en1 = e(n + 1); // elevation of strip above (n+1, nearer door)
        const yB = BY[n], yT = BY[n + 1];
        const xlB = BXL[n], xrB = BXR[n];
        const xlT = BXL[n + 1], xrT = BXR[n + 1];

        // Tread (top surface of step n)
        floorEls[`s${n}`].setAttribute('points', pts([
          [xlB, yB - en], [xrB, yB - en],
          [xrT, yT - en], [xlT, yT - en]
        ]));

        if (n > 0) {
          // Riser n: front face between strip n-1 top and strip n bottom
          const enPrev = e(n - 1);
          floorEls[`r${n}`].setAttribute('points', pts([
            [BXL[n], BY[n] - enPrev], [BXR[n], BY[n] - enPrev],
            [BXR[n], BY[n] - en],     [BXL[n], BY[n] - en]
          ]));
        }
      }

      door2Wrap.style.top = (DOOR_INIT_TOP - e(7)) + 'px';
    }

    // Snap animation (ease-out, no spring)
    let animId = null;
    function snapStairs(from, target) {
      if (animId) cancelAnimationFrame(animId);
      const startTime = performance.now();
      const duration = 380;
      function step(now) {
        const t = Math.min(1, (now - startTime) / duration);
        const e = 1 - (1 - t) * (1 - t); // ease-out quad
        const p = from + (target - from) * e;
        updateFloor(p);
        if (t < 1) animId = requestAnimationFrame(step);
        else { updateFloor(target); animId = null; }
      }
      animId = requestAnimationFrame(step);
    }

    // ── Inner door — vertical drag controls stairs ───────────────────────
    let stairsProgress = 0;
    let stairsIsOpen = false;
    let stDragging = false;
    let stStartY = 0, stLastY = 0, stLastTime = 0, stVelocity = 0, stBase = 0;
    const DRAG_SCALE = 150;

    function cY(e) { return e.touches ? e.touches[0].clientY : e.clientY; }

    door2Wrap.addEventListener('mousedown',  stDown);
    door2Wrap.addEventListener('touchstart', stDown, { passive: true });

    function stDown(e) {
      if (animId) { cancelAnimationFrame(animId); animId = null; }
      stDragging = true;
      stStartY = stLastY = cY(e);
      stLastTime = Date.now();
      stVelocity = 0;
      stBase = stairsProgress;
      door2Wrap.classList.add('dragging');
      window.addEventListener('mousemove', stMove);
      window.addEventListener('touchmove', stMove, { passive: true });
      window.addEventListener('mouseup',   stUp);
      window.addEventListener('touchend',  stUp);
    }

    function stMove(e) {
      if (!stDragging) return;
      const y = cY(e);
      stVelocity = (y - stLastY) / (Date.now() - stLastTime || 1);
      stLastY = y; stLastTime = Date.now();
      stairsProgress = Math.max(0, Math.min(1, stBase + (stStartY - y) / DRAG_SCALE));
      updateFloor(stairsProgress);
    }

    function stUp() {
      if (!stDragging) return;
      stDragging = false;
      door2Wrap.classList.remove('dragging');
      window.removeEventListener('mousemove', stMove);
      window.removeEventListener('touchmove', stMove);
      window.removeEventListener('mouseup',   stUp);
      window.removeEventListener('touchend',  stUp);

      const totalDy = stStartY - stLastY;
      if (Math.abs(totalDy) < 4) { snapStairs(stairsProgress, stairsIsOpen ? 1 : 0); return; }

      let target;
      if (Math.abs(stVelocity) > 0.4) {
        target = stVelocity < 0 ? 1 : 0; // upward velocity = open
      } else {
        target = stairsProgress >= 0.5 ? 1 : 0;
      }
      const from = stairsProgress;
      stairsIsOpen = target === 1;
      snapStairs(from, target);
    }

    // ── Init ────────────────────────────────────────────────────────────────
    updateFloor(0);

    makeDoors(
      document.getElementById('doorL'),
      document.getElementById('doorR'),
      document.getElementById('doors'),
      150, 28
    );
  </script>

</body>
</html>
